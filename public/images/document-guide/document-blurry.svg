<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Blurry document example</title>
  <desc id="desc">A red warning sample showing a blurry uploaded document.</desc>
  <defs>
    <linearGradient id="danger" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#fff1f2"/><stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
  </defs>
  <rect width="900" height="900" rx="36" fill="#fff"/>
  <rect x="26" y="26" width="848" height="848" rx="28" fill="url(#danger)" stroke="#fda4af" stroke-width="2"/>
  <g transform="translate(68 64)">
    <circle cx="48" cy="48" r="32" fill="#ef4444"/>
    <path d="M36 36l24 24m0-24L36 60" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <text x="118" y="63" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="800" fill="#dc2626">Blurry</text>
  </g>
  <rect x="92" y="188" width="716" height="626" rx="24" fill="#fff" stroke="#e5e7eb"/>
  
  <!-- Optical vector blur: overlapping copies with offset to simulate out-of-focus blur -->
  <g opacity="0.45" transform="translate(-2, -2)">
    <rect x="178" y="238" width="544" height="518" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
    <text x="450" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="800" fill="#111827">SCHOOL DOCUMENT</text>
    <g stroke="#334155" stroke-width="4">
      <path d="M224 366h452M224 430h452M224 494h452M224 558h452M224 622h452M224 686h452"/>
      <path d="M360 366v320M540 430v256"/>
    </g>
    <g fill="#334155" font-family="Arial,sans-serif" font-size="24">
      <text x="244" y="410">Student Name</text><text x="388" y="410">Sample Name</text>
      <text x="244" y="474">Grade</text><text x="388" y="474">Grade 1</text>
      <text x="244" y="538">School Year</text><text x="388" y="538">2026-2027</text>
      <text x="244" y="602">Remarks</text><text x="388" y="602">Readable text</text>
    </g>
  </g>
  
  <g opacity="0.45" transform="translate(2, 2)">
    <rect x="178" y="238" width="544" height="518" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
    <text x="450" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="800" fill="#111827">SCHOOL DOCUMENT</text>
    <g stroke="#334155" stroke-width="4">
      <path d="M224 366h452M224 430h452M224 494h452M224 558h452M224 622h452M224 686h452"/>
      <path d="M360 366v320M540 430v256"/>
    </g>
    <g fill="#334155" font-family="Arial,sans-serif" font-size="24">
      <text x="244" y="410">Student Name</text><text x="388" y="410">Sample Name</text>
      <text x="244" y="474">Grade</text><text x="388" y="474">Grade 1</text>
      <text x="244" y="538">School Year</text><text x="388" y="538">2026-2027</text>
      <text x="244" y="602">Remarks</text><text x="388" y="602">Readable text</text>
    </g>
  </g>
</svg>
