<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Blurry birth certificate example</title>
  <desc id="desc">A red warning sample showing a blurry birth certificate scan.</desc>
  <defs>
    <linearGradient id="danger" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#fff1f2"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
  </defs>
  <rect width="900" height="900" rx="36" fill="#fff"/>
  <rect x="26" y="26" width="848" height="848" rx="28" fill="url(#danger)" stroke="#fda4af" stroke-width="2"/>
  <g transform="translate(68 64)">
    <circle cx="48" cy="48" r="32" fill="#ef4444"/>
    <path d="M36 36l24 24m0-24L36 60" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <text x="118" y="63" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="800" fill="#dc2626">Blurry</text>
  </g>
  <rect x="74" y="176" width="752" height="640" rx="22" fill="#fff" stroke="#e5e7eb"/>
  
  <!-- Optical vector blur: overlapping copies with offset to simulate out-of-focus blur -->
  <g opacity="0.45" transform="translate(-2, -2)">
    <rect x="144" y="226" width="612" height="520" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
    <circle cx="205" cy="284" r="46" fill="#93c5fd" opacity=".7"/>
    <text x="290" y="292" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#111827">REPUBLIC OF THE PHILIPPINES</text>
    <text x="450" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="800" fill="#111827">CERTIFICATE OF LIVE BIRTH</text>
    <g stroke="#334155" stroke-width="3">
      <path d="M174 378h552M174 426h552M174 474h552M174 522h552M174 570h552M174 618h552M174 666h552"/>
      <path d="M324 378v288M492 426v240M644 474v192"/>
    </g>
    <g fill="#334155" font-family="Arial,sans-serif" font-size="18">
      <text x="190" y="410">Name</text><text x="350" y="410">JUAN SANTOS</text>
      <text x="190" y="458">Birth Date</text><text x="350" y="458">01 JANUARY 2024</text>
      <text x="190" y="506">Place</text><text x="350" y="506">QUEZON CITY</text>
      <text x="190" y="554">Mother</text><text x="350" y="554">MARIA SANTOS</text>
      <text x="190" y="602">Father</text><text x="350" y="602">PEDRO SANTOS</text>
    </g>
    <rect x="586" y="676" width="80" height="80" fill="#334155" opacity=".7"/>
    <path d="M420 716c58-42 96-8 142-28" stroke="#334155" stroke-width="5" fill="none"/>
  </g>
  
  <g opacity="0.45" transform="translate(2, 2)">
